name: Feature Request
description: Propose a phase-appropriate enhancement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What gap are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the smallest coherent change.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Phase Fit
      description: Explain how this fits the current repository phase.
    validations:
      required: true
