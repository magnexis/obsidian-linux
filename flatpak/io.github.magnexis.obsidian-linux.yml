id: io.github.magnexis.obsidian-linux
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: obsidian-welcome
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
modules:
  - name: obsidian-welcome
    buildsystem: simple
    build-commands:
      - install -Dm755 obsidian-welcome /app/bin/obsidian-welcome
      - install -Dm644 io.github.magnexis.obsidian-linux.desktop /app/share/applications/io.github.magnexis.obsidian-linux.desktop
      - install -Dm644 io.github.magnexis.obsidian-linux.metainfo.xml /app/share/metainfo/io.github.magnexis.obsidian-linux.metainfo.xml
      - install -Dm644 obsidian-logo.svg /app/share/icons/hicolor/scalable/apps/io.github.magnexis.obsidian-linux.svg
    sources:
      - type: file
        path: src/obsidian-welcome
      - type: file
        path: metainfo/io.github.magnexis.obsidian-linux.desktop
      - type: file
        path: metainfo/io.github.magnexis.obsidian-linux.metainfo.xml
      - type: file
        path: icons/obsidian-logo.svg
