id: io.obsidianlinux.Welcome
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: obsidian-welcome
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --filesystem=xdg-config/obsidian:create
modules:
  - name: obsidian-welcome
    buildsystem: simple
    build-commands:
      - install -Dm755 obsidian-welcome /app/bin/obsidian-welcome
      - install -Dm644 io.obsidianlinux.Welcome.desktop /app/share/applications/io.obsidianlinux.Welcome.desktop
      - install -Dm644 io.obsidianlinux.Welcome.metainfo.xml /app/share/metainfo/io.obsidianlinux.Welcome.metainfo.xml
      - install -Dm644 obsidian-logo.svg /app/share/icons/hicolor/scalable/apps/io.obsidianlinux.Welcome.svg
    sources:
      - type: file
        path: src/obsidian-welcome
      - type: file
        path: metainfo/io.obsidianlinux.Welcome.desktop
      - type: file
        path: metainfo/io.obsidianlinux.Welcome.metainfo.xml
      - type: file
        path: icons/obsidian-logo.svg
